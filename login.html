<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk | StudyBuddy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="container auth-container">
        <div class="auth-card glass-effect">
            <div class="auth-header">
                <a href="index.html" class="brand">
                    <div class="logo-morph"></div>
                    <span>StudyBuddy</span>
                </a>
                <h1>Selamat Datang Kembali</h1>
                <p>Lanjutkan perjalanan belajarmu sekarang.</p>
            </div>

            <form class="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="nama@email.com" required>
                </div>
                <div class="form-group">
                    <div class="label-row">
                        <label>Password</label>
                        <a href="#" class="forgot-link">Lupa Password?</a>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password">👁️</button>
                    </div>
                </div>

                <button type="submit" class="btn-accent btn-full">Masuk ke Dashboard</button>
                
                <div class="divider">
                    <span>atau masuk dengan</span>
                </div>

                <div class="social-auth">
                    <button type="button" class="btn-social">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                        Google
                    </button>
                    <button type="button" class="btn-social">
                        <img src="https://www.svgrepo.com/show/475654/github-color.svg" alt="GitHub">
                        GitHub
                    </button>
                </div>
            </form>

            <div class="auth-footer">
                <p>Belum punya akun? <a href="signup.html">Daftar Gratis</a></p>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
